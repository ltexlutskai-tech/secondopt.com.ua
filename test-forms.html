<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<title>Діагностика форм — secondopt.com.ua</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 860px; margin: 30px auto; padding: 0 16px; background: #f6f7f8; color: #222; }
  h1 { font-size: 1.4rem; }
  .card { background: #fff; padding: 18px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 18px; }
  label { display: block; font-size: .85rem; margin: 8px 0 4px; color: #555; }
  input, select, button { font: inherit; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
  button { background: #1a7a3c; color: #fff; border: 0; cursor: pointer; padding: 12px; font-weight: 700; margin-top: 10px; }
  button:disabled { opacity: .5; cursor: wait; }
  pre { background: #0f1f14; color: #b6e5c8; padding: 14px; border-radius: 8px; overflow: auto; font-size: .85rem; white-space: pre-wrap; word-break: break-word; max-height: 360px; }
  .ok { color: #2ecc71; font-weight: 700; }
  .err { color: #e74c3c; font-weight: 700; }
  small { color: #777; }
  code { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: .85em; }
</style>
</head>
<body>
<h1>Діагностика форм secondopt.com.ua → Telegram (через Cloudflare Worker)</h1>
<p><small>Ця сторінка робить прямий запит до <code>https://secondopt-forms.ltex-lutsk-ai.workers.dev/</code>. Відповідь показується нижче. Сторінка прихована від пошуковиків (<code>noindex</code>).</small></p>

<div class="card">
  <label>Ваше імʼя</label>
  <input id="t-name" value="Олена Тестова">
  <label>Телефон</label>
  <input id="t-phone" value="+380501234567">
  <label>Регіон (опц.)</label>
  <input id="t-region" value="Луцьк">
  <label>Категорія (опц.)</label>
  <input id="t-category" value="Одяг">
  <label>Тип форми (subject)</label>
  <select id="t-form">
    <option value="popup">popup — Запит на консультацію</option>
    <option value="catalog-modal">catalog-modal — Запит на каталог (модалка)</option>
    <option value="main">main — Запит на каталог (основна)</option>
  </select>
  <button id="t-submit">Відправити тестовий запит</button>
</div>

<div class="card">
  <strong>Лог відповіді:</strong>
  <pre id="t-log">— ще немає запитів —</pre>
</div>

<script>
var ENDPOINT = 'https://secondopt-forms.ltex-lutsk-ai.workers.dev/';
var SUBJECTS = {
  'popup': 'Запит на консультацію з secondopt.com.ua',
  'catalog-modal': 'Запит на каталог з secondopt.com.ua',
  'main': 'Запит на каталог L-TEX з secondopt.com.ua'
};

document.getElementById('t-submit').addEventListener('click', function() {
  var btn = this;
  var log = document.getElementById('t-log');
  var type = document.getElementById('t-form').value;
  btn.disabled = true;

  var payload = {
    subject: SUBJECTS[type],
    name: document.getElementById('t-name').value,
    phone: document.getElementById('t-phone').value,
    region: document.getElementById('t-region').value || undefined,
    category: document.getElementById('t-category').value || undefined,
    _form: 'test-forms.html / ' + type
  };
  Object.keys(payload).forEach(function(k) { if (payload[k] === undefined) delete payload[k]; });

  log.textContent = '→ POST ' + ENDPOINT + '\n' + JSON.stringify(payload, null, 2) + '\n\n…';

  var t0 = performance.now();
  fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    var status = res.status;
    return res.text().then(function(txt) {
      var body;
      try { body = JSON.parse(txt); } catch(e) { body = txt; }
      return { status: status, body: body };
    });
  })
  .then(function(r) {
    var dt = (performance.now() - t0).toFixed(0);
    var ok = r.body && r.body.success === true;
    log.innerHTML = (ok ? '<span class="ok">✓ SUCCESS — повідомлення надіслано в Telegram</span>' : '<span class="err">✗ FAILED</span>')
      + '  HTTP ' + r.status + '  (' + dt + 'ms)\n\n'
      + 'Response body:\n' + JSON.stringify(r.body, null, 2)
      + '\n\nЗапит:\n' + JSON.stringify(payload, null, 2);
  })
  .catch(function(err) {
    var dt = (performance.now() - t0).toFixed(0);
    log.innerHTML = '<span class="err">✗ NETWORK ERROR</span>  (' + dt + 'ms)\n\n' + (err && err.message ? err.message : String(err));
  })
  .then(function() { btn.disabled = false; });
});
</script>
</body>
</html>
